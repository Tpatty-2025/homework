<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>班級電子聯絡簿</title>
    <style>
        :root {
            --primary-color: #4CAF50;
            --secondary-color: #f1f8e9;
            --text-color: #333;
            --border-color: #c5e1a5;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif, '微軟正黑體';
            background-color: #f9f9f9;
            color: var(--text-color);
            line-height: 1.6;
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            display: grid;
            gap: 20px;
        }
        .card {
            background: #fff;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            border-top: 5px solid var(--primary-color);
        }
        /* 後台編輯區預設隱藏 */
        #adminPanel {
            display: none; 
            border-top: 5px solid #FF9800; /* 用橘色區分後台 */
        }
        h1, h2, h3 {
            color: var(--primary-color);
            margin-top: 0;
        }
        .admin-title {
            color: #FF9800;
        }
        .form-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            font-weight: bold;
            margin-bottom: 5px;
            color: #555;
        }
        input[type="date"],
        input[type="text"],
        textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 6px;
            box-sizing: border-box;
            font-family: inherit;
        }
        textarea {
            resize: vertical;
            min-height: 100px;
        }
        button {
            background-color: var(--primary-color);
            color: white;
            border: none;
            padding: 12px 24px;
            font-size: 16px;
            border-radius: 6px;
            cursor: pointer;
            width: 100%;
            font-weight: bold;
            transition: background-color 0.3s;
        }
        button:hover {
            background-color: #388E3C;
        }
        .btn-admin {
            background-color: #FF9800;
        }
        .btn-admin:hover {
            background-color: #F57C00;
        }
        .history-item {
            background: var(--secondary-color);
            border: 1px solid var(--border-color);
            padding: 15px;
            margin-bottom: 15px;
            border-radius: 8px;
            position: relative;
        }
        .history-date {
            font-size: 1.2em;
            font-weight: bold;
            color: #2E7D32;
            border-bottom: 2px solid var(--border-color);
            padding-bottom: 5px;
            margin-bottom: 10px;
        }
        .history-section {
            margin-bottom: 10px;
        }
        .history-section span {
            font-weight: bold;
            color: #555;
        }
        /* 刪除按鈕預設隱藏 */
        .delete-btn {
            display: none; 
            position: absolute;
            top: 15px;
            right: 15px;
            background-color: #ff5252;
            padding: 5px 10px;
            width: auto;
            font-size: 14px;
        }
        .delete-btn:hover {
            background-color: #d32f2f;
        }
        .empty-message {
            text-align: center;
            color: #888;
            font-style: italic;
        }
        .footer-controls {
            text-align: right;
            margin-top: 20px;
        }
        .login-btn {
            background: none;
            color: #bbb;
            border: none;
            width: auto;
            padding: 5px 10px;
            font-size: 12px;
            cursor: pointer;
            font-weight: normal;
        }
        .login-btn:hover {
            color: #888;
            background: none;
        }
    </style>
</head>
<body>

<div class="container">
    
    <div class="card" id="adminPanel">
        <h1 class="admin-title">✏️發布每日聯絡簿</h1>
        <div class="form-group">
            <label for="date">日期：</label>
            <input type="date" id="date" required>
        </div>
        <div class="form-group">
            <label for="quote">每週一句 (Quote of the Week)：</label>
            <input type="text" id="quote" placeholder="例如：勤能補拙，熟能生巧。">
        </div>
        <div class="form-group">
            <label for="homework">聯絡簿抄寫 (作業與事項)：</label>
            <textarea id="homework" placeholder="1. 國作 P.12-14&#10;2. 數習 P.20&#10;3. 訂簽聽寫本"></textarea>
        </div>
        <div class="form-group">
            <label for="notes">注意事項 (Reminders)：</label>
            <textarea id="notes" placeholder="例如：明天天氣轉涼，請記得多帶一件外套。"></textarea>
        </div>
        <button class="btn-admin" onclick="saveRecord()">儲存並發布</button>
        <button class="btn-admin" onclick="logout()" style="margin-top: 10px; background-color: #757575;">登出後台</button>
    </div>

    <div class="card">
        <h2>班級聯絡簿與歷史紀錄</h2>
        <div id="historyContainer">
            </div>
    </div>

    <div class="footer-controls">
        <button class="login-btn" onclick="checkLogin()">老師登入</button>
    </div>
</div>

<script>
    // 密碼設定 (可自行修改)
    const ADMIN_PASSWORD = 'St113';
    let isAdmin = false;

    // 網頁載入時，自動設定今天日期並讀取歷史紀錄
    document.addEventListener('DOMContentLoaded', () => {
        document.getElementById('date').valueAsDate = new Date();
        loadHistory();
    });

    // 老師登入驗證
    function checkLogin() {
        if(isAdmin) return; // 已登入則無動作
        
        const password = prompt('請輸入老師密碼以開啟編輯模式：');
        if (password === ADMIN_PASSWORD) {
            isAdmin = true;
            document.getElementById('adminPanel').style.display = 'block';
            document.querySelector('.login-btn').style.display = 'none';
            alert('登入成功！已開啟編輯權限。');
            loadHistory(); // 重新載入以顯示刪除按鈕
        } else if (password !== null) {
            alert('密碼錯誤！');
        }
    }

    // 老師登出
    function logout() {
        isAdmin = false;
        document.getElementById('adminPanel').style.display = 'none';
        document.querySelector('.login-btn').style.display = 'inline-block';
        alert('已登出，恢復純檢視模式。');
        loadHistory(); // 重新載入以隱藏刪除按鈕
    }

    // 儲存紀錄的函數
    function saveRecord() {
        const date = document.getElementById('date').value;
        const quote = document.getElementById('quote').value;
        const homework = document.getElementById('homework').value;
        const notes = document.getElementById('notes').value;

        if (!date || !homework) {
            alert('「日期」與「聯絡簿抄寫」為必填項目！');
            return;
        }

        const record = {
            id: Date.now().toString(),
            date: date,
            quote: quote,
            homework: homework,
            notes: notes
        };

        let records = JSON.parse(localStorage.getItem('contactBookRecords')) || [];
        records.unshift(record);
        localStorage.setItem('contactBookRecords', JSON.stringify(records));

        document.getElementById('quote').value = '';
        document.getElementById('homework').value = '';
        document.getElementById('notes').value = '';

        loadHistory();
        alert('紀錄已成功儲存！');
    }

    // 讀取並顯示歷史紀錄的函數
    function loadHistory() {
        const historyContainer = document.getElementById('historyContainer');
        const records = JSON.parse(localStorage.getItem('contactBookRecords')) || [];

        historyContainer.innerHTML = ''; 

        if (records.length === 0) {
            historyContainer.innerHTML = '<p class="empty-message">目前還沒有任何聯絡簿紀錄喔。</p>';
            return;
        }

        records.sort((a, b) => new Date(b.date) - new Date(a.date));

        records.forEach(record => {
            const itemDiv = document.createElement('div');
            itemDiv.className = 'history-item';

            const formattedHomework = record.homework.replace(/\n/g, '<br>');
            const formattedNotes = record.notes ? record.notes.replace(/\n/g, '<br>') : '無';
            const formattedQuote = record.quote ? record.quote : '無';

            // 若為登入狀態，則加入並顯示刪除按鈕 (inline-block)
            const deleteBtnStyle = isAdmin ? 'display: inline-block;' : 'display: none;';

            itemDiv.innerHTML = `
                <button class="delete-btn" style="${deleteBtnStyle}" onclick="deleteRecord('${record.id}')">刪除</button>
                <div class="history-date">${record.date}</div>
                <div class="history-section">
                    <span>每週一句：</span> ${formattedQuote}
                </div>
                <div class="history-section">
                    <span>聯絡簿抄寫：</span><br>
                    ${formattedHomework}
                </div>
                <div class="history-section">
                    <span>注意事項：</span><br>
                    ${formattedNotes}
                </div>
            `;
            historyContainer.appendChild(itemDiv);
        });
    }

    // 刪除單筆紀錄的函數
    function deleteRecord(id) {
        if (confirm('確定要刪除這筆聯絡簿紀錄嗎？')) {
            let records = JSON.parse(localStorage.getItem('contactBookRecords')) || [];
            records = records.filter(record => record.id !== id);
            localStorage.setItem('contactBookRecords', JSON.stringify(records));
            loadHistory();
        }
    }
</script>

</body>
</html>
