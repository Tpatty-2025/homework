<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>班級電子聯絡簿</title>
    <style>
        :root {
            --primary-color: #4CAF50;
            --secondary-color: #f1f8e9;
            --text-color: #333;
            --border-color: #c5e1a5;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif, '微軟正黑體';
            background-color: #f9f9f9;
            color: var(--text-color);
            line-height: 1.6;
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            display: grid;
            gap: 20px;
        }
        .card {
            background: #fff;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            border-top: 5px solid var(--primary-color);
        }
        h1, h2, h3 {
            color: var(--primary-color);
            margin-top: 0;
        }
        .form-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            font-weight: bold;
            margin-bottom: 5px;
            color: #555;
        }
        input[type="date"],
        input[type="text"],
        textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 6px;
            box-sizing: border-box;
            font-family: inherit;
        }
        textarea {
            resize: vertical;
            min-height: 100px;
        }
        button {
            background-color: var(--primary-color);
            color: white;
            border: none;
            padding: 12px 24px;
            font-size: 16px;
            border-radius: 6px;
            cursor: pointer;
            width: 100%;
            font-weight: bold;
            transition: background-color 0.3s;
        }
        button:hover {
            background-color: #388E3C;
        }
        .history-item {
            background: var(--secondary-color);
            border: 1px solid var(--border-color);
            padding: 15px;
            margin-bottom: 15px;
            border-radius: 8px;
            position: relative;
        }
        .history-date {
            font-size: 1.2em;
            font-weight: bold;
            color: #2E7D32;
            border-bottom: 2px solid var(--border-color);
            padding-bottom: 5px;
            margin-bottom: 10px;
        }
        .history-section {
            margin-bottom: 10px;
        }
        .history-section span {
            font-weight: bold;
            color: #555;
        }
        .delete-btn {
            position: absolute;
            top: 15px;
            right: 15px;
            background-color: #ff5252;
            padding: 5px 10px;
            width: auto;
            font-size: 14px;
        }
        .delete-btn:hover {
            background-color: #d32f2f;
        }
        .empty-message {
            text-align: center;
            color: #888;
            font-style: italic;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="card">
        <h1>發布每日聯絡簿</h1>
        <div class="form-group">
            <label for="date">日期：</label>
            <input type="date" id="date" required>
        </div>
        <div class="form-group">
            <label for="quote">每週一句 (Quote of the Week)：</label>
            <input type="text" id="quote" placeholder="例如：勤能補拙，熟能生巧。">
        </div>
        <div class="form-group">
            <label for="homework">聯絡簿抄寫 (作業與事項)：</label>
            <textarea id="homework" placeholder="1. 國作 P.12-14&#10;2. 數習 P.20&#10;3. 訂簽聽寫本"></textarea>
        </div>
        <div class="form-group">
            <label for="notes">注意事項 (Reminders)：</label>
            <textarea id="notes" placeholder="例如：明天天氣轉涼，請記得多帶一件外套。"></textarea>
        </div>
        <button onclick="saveRecord()">儲存並發布</button>
    </div>

    <div class="card">
        <h2>歷史紀錄存取</h2>
        <div id="historyContainer">
            </div>
    </div>
</div>

<script>
    // 網頁載入時，自動設定今天日期並讀取歷史紀錄
    document.addEventListener('DOMContentLoaded', () => {
        document.getElementById('date').valueAsDate = new Date();
        loadHistory();
    });

    // 儲存紀錄的函數
    function saveRecord() {
        const date = document.getElementById('date').value;
        const quote = document.getElementById('quote').value;
        const homework = document.getElementById('homework').value;
        const notes = document.getElementById('notes').value;

        if (!date || !homework) {
            alert('「日期」與「聯絡簿抄寫」為必填項目！');
            return;
        }

        // 建立資料物件
        const record = {
            id: Date.now().toString(), // 用時間戳記當作唯一 ID
            date: date,
            quote: quote,
            homework: homework,
            notes: notes
        };

        // 從 LocalStorage 取得現有資料，若無則建立空陣列
        let records = JSON.parse(localStorage.getItem('contactBookRecords')) || [];
        
        // 將新紀錄加入陣列開頭 (最新的在最上面)
        records.unshift(record);

        // 存回 LocalStorage
        localStorage.setItem('contactBookRecords', JSON.stringify(records));

        // 清空輸入框 (保留日期)
        document.getElementById('quote').value = '';
        document.getElementById('homework').value = '';
        document.getElementById('notes').value = '';

        // 重新載入歷史紀錄顯示
        loadHistory();
        alert('紀錄已成功儲存！');
    }

    // 讀取並顯示歷史紀錄的函數
    function loadHistory() {
        const historyContainer = document.getElementById('historyContainer');
        const records = JSON.parse(localStorage.getItem('contactBookRecords')) || [];

        historyContainer.innerHTML = ''; // 清空現有內容

        if (records.length === 0) {
            historyContainer.innerHTML = '<p class="empty-message">目前還沒有任何聯絡簿紀錄喔。</p>';
            return;
        }

        // 按照日期遞減排序 (確保最新的日期在最上面)
        records.sort((a, b) => new Date(b.date) - new Date(a.date));

        // 遍歷紀錄並建立 HTML 元素
        records.forEach(record => {
            const itemDiv = document.createElement('div');
            itemDiv.className = 'history-item';

            // 將換行字元替換為 <br> 以在網頁上正常顯示換行
            const formattedHomework = record.homework.replace(/\n/g, '<br>');
            const formattedNotes = record.notes ? record.notes.replace(/\n/g, '<br>') : '無';
            const formattedQuote = record.quote ? record.quote : '無';

            itemDiv.innerHTML = `
                <button class="delete-btn" onclick="deleteRecord('${record.id}')">刪除</button>
                <div class="history-date">${record.date}</div>
                <div class="history-section">
                    <span>每週一句：</span> ${formattedQuote}
                </div>
                <div class="history-section">
                    <span>聯絡簿抄寫：</span><br>
                    ${formattedHomework}
                </div>
                <div class="history-section">
                    <span>注意事項：</span><br>
                    ${formattedNotes}
                </div>
            `;
            historyContainer.appendChild(itemDiv);
        });
    }

    // 刪除單筆紀錄的函數
    function deleteRecord(id) {
        if (confirm('確定要刪除這筆聯絡簿紀錄嗎？')) {
            let records = JSON.parse(localStorage.getItem('contactBookRecords')) || [];
            // 過濾掉要刪除的 ID
            records = records.filter(record => record.id !== id);
            // 更新 LocalStorage
            localStorage.setItem('contactBookRecords', JSON.stringify(records));
            // 重新載入畫面
            loadHistory();
        }
    }
</script>

</body>
</html>
